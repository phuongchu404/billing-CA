server:
  port: 9292
  servlet:
    context-path: /

spring:
  application:
    name: rs-subscription-management-service
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/billing-ca?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:billing_user}
    password: ${DB_PASSWORD:change_me_billing_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SSO_JWKS_URI:http://host.docker.internal:9090/.well-known/jwks.json}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

sms:
  auth:
    jwt:
      algorithm: RS256
      private-key-path: ${SMS_JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
      public-key-path: ${SMS_JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
      access-token-ttl: ${SMS_JWT_ACCESS_TOKEN_TTL:3600}
      refresh-token-ttl: ${SMS_JWT_REFRESH_TOKEN_TTL:604800}
    password:
      bcrypt-strength: 12
      min-length: 8
      require-uppercase: true
      require-digit: true
      require-special-char: true
      lockout-threshold: 5
      lockout-duration-minutes: 15
      password-history-count: 5
  webhook:
    secret: ${WEBHOOK_SECRET:change_me_webhook_secret}
  cert:
    auto-provision:
      on-approval: ${CERT_AUTO_PROVISION_ON_APPROVAL:false}
      on-zero-fee: ${CERT_AUTO_PROVISION_ON_ZERO_FEE:false}

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost}

rs:
  core:
    base-url: ${RS_CORE_BASE_URL:http://host.docker.internal:8081}
    service-token: ${RS_CORE_SERVICE_TOKEN:change_me_rs_core_token}
    connect-timeout-ms: 3000
    read-timeout-ms: 10000
    cert:
      max-retries: 5
      retry-cron: "0 */5 * * * *"
      backoff-minutes: 1,5,15,60,360

mail:
  enabled: ${MAIL_ENABLED:false}
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  from:
    name: ${MAIL_FROM_NAME:Subscription Management}
    address: ${MAIL_FROM_ADDRESS:}
  ssl:
    enabled: ${MAIL_SSL_ENABLED:false}

minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:change_me_minio_password}
  bucket-public: ${MINIO_BUCKET_PUBLIC:billing-public}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000/billing-public}
  public-policy: minio-public-policy.json
  cleanup:
    grace-period-minutes: ${MINIO_CLEANUP_GRACE_MINUTES:60}
    cron: ${MINIO_CLEANUP_CRON:0 0 * * * *}

logging:
  file:
    name: ${LOGGING_FILE_NAME:/app/logs/billing-ca.log}
  level:
    com.rs.subscription: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
