name: billing-ca

services:
  mysql:
    image: mysql:8.4
    container_name: billing-ca-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USERNAME} -p${DB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - billing-ca-network

  redis:
    image: redis:7.2-alpine
    container_name: billing-ca-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - billing-ca-network

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: billing-ca-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - billing-ca-network

  billing-backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    image: billing-ca-backend:${APP_VERSION}
    container_name: billing-ca-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      JAVA_OPTS: ${JAVA_OPTS}
      SPRING_CONFIG_ADDITIONAL_LOCATION: optional:file:/app/config/
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SSO_JWKS_URI: ${SSO_JWKS_URI}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      RS_CORE_BASE_URL: ${RS_CORE_BASE_URL}
      RS_CORE_SERVICE_TOKEN: ${RS_CORE_SERVICE_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      MAIL_ENABLED: ${MAIL_ENABLED}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_SSL_ENABLED: ${MAIL_SSL_ENABLED}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      LOGGING_FILE_NAME: /app/logs/billing-ca.log
    ports:
      - "${BACKEND_PORT}:9292"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../backend/config:/app/config:ro
      - ../backend/logs:/app/logs
    networks:
      - billing-ca-network

  billing-frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    image: billing-ca-frontend:${APP_VERSION}
    container_name: billing-ca-frontend
    restart: unless-stopped
    depends_on:
      - billing-backend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - billing-ca-network

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  billing-ca-network:
    name: billing-ca-network
    driver: bridge
