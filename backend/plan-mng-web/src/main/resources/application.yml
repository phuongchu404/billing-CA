server:
  port: 9292
  servlet:
    context-path: /

spring:
  application:
    name: rs-subscription-management-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/billing-ca?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
#      password: ${REDIS_PASSWORD:1}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SSO_JWKS_URI:http://localhost:9090/.well-known/jwks.json}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# SMS Local Auth Configuration
sms:
  auth:
    jwt:
      algorithm: RS256
      private-key-path: ${SMS_JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
      public-key-path: ${SMS_JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
      access-token-ttl: 3600       # 1 hour in seconds
      refresh-token-ttl: 604800    # 7 days in seconds
    password:
      bcrypt-strength: 12
      min-length: 8
      require-uppercase: true
      require-digit: true
      require-special-char: true
      lockout-threshold: 5
      lockout-duration-minutes: 15
      password-history-count: 5
  webhook:
    secret: ${WEBHOOK_SECRET:dev-webhook-secret-change-in-prod}
  cert:
    auto-provision:
      on-approval: false   # Trigger 1: auto-provision certificate when subscription is approved
      on-zero-fee: false   # Trigger 2: auto-provision certificate when zero-fee plan is activated

# Frontend URL — dùng trong email notification
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost}

# RS Core Integration
rs:
  core:
    base-url: ${RS_CORE_BASE_URL:http://localhost:8081}
    service-token: ${RS_CORE_SERVICE_TOKEN:dev-service-token}
    connect-timeout-ms: 3000
    read-timeout-ms: 10000
    cert:
      max-retries: 5
      retry-cron: "0 */5 * * * *"
      backoff-minutes: 1,5,15,60,360

mail:
  enabled: ${MAIL_ENABLED:true}
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:phuongchu404@gmail.com}
  password: ${MAIL_PASSWORD:tjoi ivpe vgvt flqq}
  from:
    name: ${MAIL_FROM_NAME:Subscription Management}
    address: ${MAIL_FROM_ADDRESS:phuongchu404@gmail.com}
  ssl:
    enabled: ${MAIL_SSL_ENABLED:false}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket-public: ${MINIO_BUCKET_PUBLIC:billing-public}
  public-url: ${MINIO_PUBLIC_URL:http://localhost:9000/billing-public}
  public-policy: minio-public-policy.json
  cleanup:
    grace-period-minutes: ${MINIO_CLEANUP_GRACE_MINUTES:60}
    cron: ${MINIO_CLEANUP_CRON:0 0 * * * *}

logging:
  level:
    com.rs.subscription: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
