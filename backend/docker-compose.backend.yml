name: billing

# MySQL cài ngoài host, không cần service riêng trong compose
# Đảm bảo MySQL trên host cho phép kết nối từ 127.0.0.1 hoặc bind-address = 0.0.0.0
services:
  redis:
    image: redis:7.2-alpine
    container_name: billing_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - billing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  billing-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: billing-backend:latest
    container_name: billing_backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9292:9292"
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"

      DB_URL: "jdbc:mysql://host.docker.internal:${MYSQL_PORT:-3307}/billing-ca?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC"
      DB_USERNAME: ${DB_USERNAME:-billing_user}
      DB_PASSWORD: ${DB_PASSWORD:-billing_pass}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      # SSO — trỏ về Keycloak hoặc SSO service ngoài
      SSO_JWKS_URI: ${SSO_JWKS_URI:-http://host.docker.internal:9090/.well-known/jwks.json}

      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}

      # RS Core Integration
      RS_CORE_BASE_URL: ${RS_CORE_BASE_URL:-http://host.docker.internal:8081}
      RS_CORE_SERVICE_TOKEN: ${RS_CORE_SERVICE_TOKEN:-dev-service-token}

      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-webhook-secret-change-in-prod}

      # Mail
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-phuongchu404@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Subscription Management}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-phuongchu404@gmail.com}
    volumes:
      - billing_logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - billing-network

volumes:
  redis_data:
  billing_logs:

networks:
  billing-network:
    name: billing-network
