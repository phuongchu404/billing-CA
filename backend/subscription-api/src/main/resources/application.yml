server:
  port: 9393
  servlet:
    context-path: /

spring:
  application:
    name: rs-subscription-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/rs_subscription?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
    username: ${DB_USERNAME:dev}
    password: ${DB_PASSWORD:Dev2019@!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
  flyway:
    enabled: false   # migrations are owned by plan-mng-web
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:1}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SSO_JWKS_URI:http://localhost:9090/.well-known/jwks.json}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# SMS Local Auth Configuration
sms:
  auth:
    jwt:
      algorithm: RS256
      private-key-path: ${SMS_JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
      public-key-path: ${SMS_JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
      access-token-ttl: 3600
      refresh-token-ttl: 604800

# RS Core Integration
rs:
  core:
    base-url: ${RS_CORE_BASE_URL:http://localhost:8081}
    service-token: ${RS_CORE_SERVICE_TOKEN:dev-service-token}
    connect-timeout-ms: 3000
    read-timeout-ms: 10000
    cert:
      max-retries: 5
      retry-cron: "0 */5 * * * *"
      backoff-minutes: 1,5,15,60,360

logging:
  level:
    com.rs.subscription: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
